<body>

<div class="hero">
  <div class="hero-text">
    <h1>PWAVES</h1>
    <p>AI Film Director</p>
  </div>
</div>

<div class="section">
  <h2>Watch Now</h2>
  <div class="scroll">
    <img src="images/FB.jpeg" onclick="playVideo('https://www.youtube.com/embed/-mdn3oECRVM')">
    <img src="images/DF.JPEG" onclick="playVideo('https://www.youtube.com/embed/S_YFGUkV2FE')">
  </div>
</div>

<div class="section">
  <h2>Coming Soon</h2>
  <div class="scroll">
    <img src="images/travel.jpg" onclick="openPopup()">
    <img src="images/time.jpg" onclick="openPopup()">
    <img src="images/feelgoof.jpg" onclick="openPopup()">
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="closePopup()">
  <h2>COMING SOON</h2>
</div>

<!-- VIDEO -->
<div id="video" class="popup">
  <iframe id="frame" allowfullscreen></iframe>
</div>

<script>
function openPopup(){
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}
function playVideo(url){
  document.getElementById("video").style.display="flex";
  document.getElementById("frame").src=url+"?autoplay=1";
}
document.getElementById("video").onclick=function(){
  this.style.display="none";
  document.getElementById("frame").src="";
}
</script>

</body>
